name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm run test

      - name: Production Build
        run: npm run build

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test

      - name: Dependency Audit
        run: npm audit --audit-level=high
        continue-on-error: true

  evals-smoke:
    name: AI Eval Harness (smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run Eval Harness (mock mode)
        run: node evals/runEvals.js

      - name: Upload Eval Scorecard
        uses: actions/upload-artifact@v4
        with:
          name: eval-scorecard
          path: evals/report.md

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    # Non-blocking while the E2E suite is being tuned against the deployed app,
    # so a selector tweak never reds the whole pipeline. Remove once stable.
    continue-on-error: true
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright
        run: npm i -D @playwright/test && npx playwright install --with-deps chromium

      - name: Run E2E Smoke
        run: npx playwright test

      - name: Upload Playwright Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
