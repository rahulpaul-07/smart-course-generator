name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint
        
      # Note: TypeScript type checking script is missing from frontend/package.json. Skipping instead of inventing a command.

      - name: Run Unit Tests
        run: npm run test

      - name: Production Build
        run: npm run build

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        
      # Note: Linting script is missing from backend/package.json. Skipping instead of inventing a command.
      # Note: TypeScript type checking script is missing from backend/package.json. Skipping instead of inventing a command.

      - name: Run Unit Tests
        run: npm run test
        
      # Note: Production build script is not present (or applicable) for the backend. Skipping.
